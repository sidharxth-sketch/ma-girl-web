<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You 🤍</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#FFF9F5;

overflow:hidden;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

position:relative;

}

/* Sparkles */

.sparkles{

position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:.25;

}

/* Decorations */

.corner{

position:absolute;
width:170px;

}

.left{

left:20px;
top:20px;

}

.right{

right:20px;
top:20px;

}

.bottomleft{

left:20px;
bottom:20px;

}

.bottomright{

right:20px;
bottom:20px;

}

.center{

text-align:center;
z-index:5;
animation:fade 2s;

}

.center img{

width:260px;

margin-bottom:20px;

}

h1{

font-size:55px;

margin-bottom:15px;

}

p{

font-size:22px;

line-height:1.8;

color:#555;

margin:12px;

}

.cat{

position:absolute;

bottom:25px;

left:50%;

transform:translateX(-50%);

width:180px;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}

</style>

</head>

<body>

<img class="sparkles" src="ending/sparkles.gif">

<img class="corner left" src="ending/lily.gif">

<img class="corner right" src="ending/lily.gif">

<img class="corner bottomleft" src="ending/teddy2.gif">

<img class="corner bottomright" src="ending/flowers.gif">

<div class="center">

<img src="ending/teddy.gif">

<h1>🤍 Thank You 🤍</h1>

<p>

You reached the very end.

</p>

<p>

I know this wasn't the biggest gift...

but I wanted to make something

with my own hands.

</p>

<p>

I hope it made you smile,

even if it was just for a few minutes.

🌸

</p>

<p>

Thank you for being you.

</p>

<h2>

Love,

Sid 🤍

</h2>

</div>

<img class="cat" src="ending/catsleep.gif">

</body>
</html>
