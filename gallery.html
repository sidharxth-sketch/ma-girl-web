<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission: Make Sakina Smile 🤍</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f5f5f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* Loading Screen */

#loading{
    text-align:center;
}

#loading h1{
    font-size:40px;
    margin-bottom:20px;
}

#loading p{
    font-size:22px;
    color:#555;
    margin:12px 0;
}

.bar{
    width:320px;
    height:18px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin:25px auto;
}

.fill{
    width:0%;
    height:100%;
    background:black;
    animation:load 4s forwards;
}

@keyframes load{
    from{width:0%;}
    to{width:100%;}
}

/* Gallery */

#gallery{
    display:none;
}

.card{
    background:white;
    padding:40px;
    border-radius:30px;
    width:650px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.12);
}

img{
    width:320px;
    height:420px;
    object-fit:cover;
    border-radius:20px;
    margin:20px 0;
}

button{
    padding:15px 30px;
    border:none;
    border-radius:50px;
    background:black;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin:8px;
}

button:hover{
    transform:scale(1.05);
}

h2{
    margin-bottom:15px;
}

p{
    color:#555;
    font-size:20px;
    margin-bottom:20px;
}

</style>
</head>

<body>

<!-- Loading -->

<div id="loading">

<h1>🎯 Mission Started</h1>

<p><b>Objective:</b> Make Sakina Smile 🤍</p>

<p>Agent: Evil Larry 🐱</p>

<div class="bar">
<div class="fill"></div>
</div>

<p id="status">
Initializing mission...
</p>

</div>

<!-- Gallery -->

<div id="gallery">

<div class="card">

<h2 id="title"></h2>

<img id="photo" src="images/her1.jpg">

<p id="caption"></p>

<button onclick="previousPhoto()">⬅ Previous</button>

<button onclick="nextPhoto()">Next ➜</button>

</div>

</div>

<script>

const statuses=[
"Checking cuteness levels...",
"Finding best memories...",
"Downloading courage...",
"Mission Ready ✅"
];

let s=0;

const statusInterval=setInterval(()=>{

document.getElementById("status").innerHTML=statuses[s];

s++;

if(s>=statuses.length){
clearInterval(statusInterval);
}

},1000);

setTimeout(()=>{

document.getElementById("loading").style.display="none";

document.getElementById("gallery").style.display="block";

show();

},4200);

let current=0;

const photos=[

{
src:"images/her1.jpg",
title:"🤍 You are not real",
caption:"I understand why Sid won't stop talking about you."
},

{
src:"images/cat.jpg",
title:"🐱 Your cat... or OUR cat?",
caption:"Finally... a worthy opponent. 😼"
},

{
src:"images/her2.jpg",
title:"❤️ Still unfair",
caption:"Bro literally made a website instead of saying 'I miss you'."
}

];

function show(){

document.getElementById("photo").src=photos[current].src;

document.getElementById("title").innerHTML=photos[current].title;

document.getElementById("caption").innerHTML=photos[current].caption;

}

function previousPhoto(){

current--;

if(current<0){

current=photos.length-1;

}

show();

}

function nextPhoto(){

current++;

if(current>=photos.length){

document.body.innerHTML=`

<div class="card">

<h1>🎯 Mission Complete</h1>

<h2>Objective</h2>

<p><b>Make Sakina Smile 🤍</b></p>

<p style="font-size:28px;">██████████ 100%</p>

<hr style="margin:25px 0;">

<h2>📋 Mission Report</h2>

<p><b>Agent:</b> Evil Larry 🐱</p>

<p><b>Target:</b> Sakina 🤍</p>

<p><b>Status:</b> Extremely Adorable</p>

<p><b>Mission Outcome:</b> SUCCESS ✅</p>

<br>

<p>✔ Subject smiled.</p>
<p>✔ Subject stole Sid's heart.</p>
<p>✔ Cat approved the relationship.</p>
<p>⚠️ Warning: Excessive cuteness detected.</p>

<br>

<h2>Case Closed. 🤍</h2>

<p>Website handmade by Sid with lots of coffee and overthinking.</p>

<button onclick="location.href='game.html'">
🎮 Secret Bonus Game
</button>

</div>

`;

return;

}

show();

}

</script>

</body>
</html>
