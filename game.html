<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed your cat🐱</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f7;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    overflow-y:auto;
    padding:20px 0;
}
.card{
    background:white;
    padding:40px;
    border-radius:25px;
    width:700px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

h1{
    margin-bottom:10px;
}

img{
    width:220px;
    margin:20px 0;
}

#message{
    font-size:22px;
    color:#555;
    min-height:60px;
}

.foods{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-top:25px;
}

.food{
    font-size:45px;
    background:#fafafa;
    border-radius:20px;
    padding:20px;
    cursor:pointer;
    transition:.25s;
}

.food:hover{
    transform:scale(1.08);
    background:#ececec;
}

#happy{
    font-size:22px;
    margin-top:20px;
}

button{
    margin-top:25px;
    padding:15px 30px;
    border:none;
    border-radius:40px;
    background:black;
    color:white;
    font-size:18px;
    cursor:pointer;
    display:none;
}

</style>

</head>

<body>

<div class="card">

<h1>🐱 Feed Evil Larry</h1>

<p id="message">
I'm hungry... choose wisely.
</p>

<img src="images/cat2.gif">

<div id="happy">
Happiness: ❤️ 0 / 5
</div>

<div class="foods">

<div class="food" onclick="feed('fish')">🐟</div>

<div class="food" onclick="feed('cake')">🍰</div>

<div class="food" onclick="feed('pizza')">🍕</div>

<div class="food" onclick="feed('broccoli')">🥦</div>

<div class="food" onclick="feed('sushi')">🍣</div>

<div class="food" onclick="feed('milk')">🥛</div>

</div>

<button id="finish" onclick="location.href='index.html'">
🏆 Finish Mission
</button>

</div>

<script>

let happiness=0;

function feed(food){

const message=document.getElementById("message");

if(food==="fish"){

message.innerHTML="😻 FISH!! YOU UNDERSTAND ME.";
happiness++;

}

else if(food==="sushi"){

message.innerHTML="🍣 Okay... this is acceptable.";
happiness++;

}

else if(food==="milk"){

message.innerHTML="🥛 Meow! Thank you!";
happiness++;

}

else if(food==="pizza"){

message.innerHTML="🍕 I'll allow it... just this once.";

}

else if(food==="cake"){

message.innerHTML="🍰 Too sweet... but thanks.";

}

else{

message.innerHTML="🥦 Absolutely NOT.";

}


if(happiness>5){
happiness=5;
}


document.getElementById("happy").innerHTML=
"Happiness: ❤️ "+happiness+" / 5";


if(happiness>=5){

message.innerHTML=`

<h2>🏆 Achievement Unlocked</h2>

🐱

You're officially my favorite human.

<br><br>

Now promise me one thing...

<br><br>

❤️ Take good care of Sid.

`;

document.getElementById("finish").style.display="inline-block";

document.getElementById("finish").innerHTML="🛡️ Secret Level";

document.getElementById("finish").onclick=function(){

location.href="savelarry.html";

};

}

}

</script></body></html>
