<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Terminal 🤍</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0d1117;
color:#00ff7f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.card{
width:min(90%,600px);
background:#161b22;
padding:35px;
border-radius:20px;
text-align:center;
box-shadow:0 0 30px rgba(0,255,127,.15);
}

h1{
margin-bottom:20px;
}

p{
font-size:20px;
margin:15px 0;
line-height:1.6;
}

input{
width:100%;
padding:15px;
font-size:20px;
border:none;
border-radius:10px;
margin-top:20px;
text-align:center;
}

button{
margin-top:20px;
padding:15px 35px;
border:none;
border-radius:40px;
background:#00ff7f;
color:black;
font-size:20px;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<h1>🔒 SECRET TERMINAL</h1>

<p>
Only Agent Sakina can unlock this.
</p>

<p>
Enter the secret code:
</p>

<input id="code" placeholder="Enter code...">

<button onclick="checkCode()">
Unlock 🔓
</button>

</div>

<script>

function checkCode(){

    const code = document.getElementById("code").value.toLowerCase().trim();

    if(code === "meow"){

        document.body.innerHTML = `
        <div class="card">
            <h1>🎉 ACCESS GRANTED</h1>

            <p>🐱</p>

            <p>Wait...</p>

            <p>You actually figured it out?!</p>

            <br>

            <p>
            Welcome, Agent Sakina.<br><br>
            The Cat Council has been expecting you.
            </p>

            <br>

            <h2>🏆 Achievement Unlocked</h2>

            <p>Professional Cat Whisperer</p>

            <br>

            <p>
            Thank you for making it all the way here.<br><br>
            I hope this silly little website made you smile. 🤍
            </p>

            <h3>- Sid ❤️</h3>

<br>

<button onclick="location.href='ending.html'">
🤍 One Last Surprise
</button>

</div>

        </div>
        `;

    } else {

        alert("❌ Incorrect password.\n\nEvil Larry looked disappointed.\n\nTry speaking his language. 🐱");

    }

}

</script>

</body>
</html>
